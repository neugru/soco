branches:
  - main
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: "conventionalcommits"
      # Custom release rules to prevent 1.0.0
      releaseRules:
        - breaking: true
          release: minor    # Downgrade major breaking changes to a minor bump
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch

  - - "@semantic-release/release-notes-generator"
    - preset: "conventionalcommits"
  - "@semantic-release/changelog"
  - - "@semantic-release/exec"
    - prepareCmd: "cider version ${nextRelease.version}"
  - - "@semantic-release/git"
    - assets:
        - pubspec.yaml
        - CHANGELOG.md
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
  - "@semantic-release/github"
