name: widgetbook_workspace
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  widgetbook: ^3.25.0
  widgetbook_annotation: ^3.11.0
  soco:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
  fonts:
    - family: Soco Icons
      fonts:
        - asset: assets/fonts/SocoIcons.otf
